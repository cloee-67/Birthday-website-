<!DOCTYPE html>
<html>
<head>
<title>Bye 👋</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff0f5);
font-family:Arial,sans-serif;
text-align:center;
}

.card{
background:white;
padding:35px;
border-radius:25px;
width:320px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
animation:fadeIn 1.2s ease;
}

h1{
color:#ff69b4;
}

p{
color:#555;
line-height:1.6;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="card">

<h1>🎀 That's a Wrap! 🎀</h1>

<p>
I hope this little surprise made you smile 🩷<br><br>

Byeeee! 👋 Take care of yourself, enjoy your day, eat lots of cake 🎂, and don't forget to send me cute pictures 📸✨<br><br>

See you soon... 🤍
</p>

</div>

</body>
</html>
