<!DOCTYPE html>
<html>
<head>
<title>Excuse Me?! 😤</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff0f5);
font-family:Arial,sans-serif;
text-align:center;
}

.card{
background:white;
padding:35px;
border-radius:25px;
width:320px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
animation:pop .5s ease;
}

h1{
color:#ff69b4;
}

p{
color:#555;
line-height:1.6;
}

button{
margin-top:20px;
padding:12px 24px;
border:none;
border-radius:25px;
background:#ffb6c1;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff8fab;
transform:scale(1.08);
}

@keyframes pop{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>
</head>

<body>

<div class="card">

<h1>😤 Excuse me?!</h1>

<p>
You actually clicked <b>No</b>? 😭<br><br>
How dare you! I spent so much time making this birthday surprise just for you. 🎀💖<br><br>
Now be nice and go back... the gifts are waiting for you! 🎁✨
</p>

<button onclick="window.location.href='ready.html'">🥹 Okay, I'll Go Back</button>

</div>

</body>
</html>
