<!DOCTYPE html>
<html>
<head>
<title>Ready? 🎀</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff0f5);
font-family:Arial,sans-serif;
}

.card{
background:white;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.15);
width:320px;
}

h2{
color:#ff69b4;
}

p{
color:#666;
margin-bottom:25px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:25px;
background:#ffb6c1;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff8fab;
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="card">

<h2>🎀 Are you ready? 🎀</h2>

<p>
I've prepared a few little birthday surprises just for you... 💖<br><br>
Are you ready to open them? ✨
</p>

<button onclick="window.location.href='gifts.html'">💖 Yes!!</button>

<button onclick="window.location.href='no.html'">🙄 No</button>

</div>

</body>
</html>
